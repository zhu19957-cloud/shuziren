<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色选择</title>
    <!-- 预连接Google字体服务器，提升加载速度 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入思源黑体和马善政书法字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        /* ==================== 配置区域 - 在这里调整所有关键尺寸和位置 ==================== */
        :root {
            /* === 角色信息位置配置 === */
            --character-info-top: 53%;           /* 角色名字和性格描述的垂直位置（越大越靠下）*/
            --character-name-size: 48px;         /* 角色名字字体大小 */
            --character-personality-size: 14px;  /* 性格描述字体大小 */

            /* === 轮盘位置和尺寸配置 === */
            --wheel-bottom: 20px;                /* 轮盘距离底部的距离（越大越靠上）*/
            --wheel-height: 180px;               /* 轮盘容器高度 */
            --wheel-radius: 230;                 /* 轮盘半径（数值越大，头像之间距离越远）*/
            --wheel-item-size: 70px;             /* 非选中头像的大小 */
            --wheel-item-active-size: 90px;      /* 选中头像的放大尺寸 */
            --wheel-gap: 22px;                   /* 轮盘和按钮之间的间距 */

            /* === 第二步元素位置配置 === */
            --step2-top: 69%;                    /* 第二步容器的垂直位置（越大越靠下，确保在角色信息下方）*/
            --step2-question-top-margin: -10px;    /* 问题文字上方间距 */
            --step2-question-bottom-margin: 10px; /* 问题文字下方间距 */
            --step2-question-size: 20px;         /* 问题文字大小 */
            --step2-input-height: 35px;          /* 输入框高度 */
            --step2-input-bottom-margin: 10px;   /* 输入框下方间距 */
            --step2-voice-title-size: 18px;      /* 音色标题文字大小 */
            --step2-voice-title-bottom-margin: 15px; /* 音色标题下方间距 */
            --step2-voice-button-height: 35px;   /* 音色按钮高度 */
            --step2-voice-button-gap: 10px;      /* 音色按钮之间间距 */
            --step2-voice-options-bottom-margin: 25px; /* 音色选项区域下方间距 */

            /* === 返回按钮配置 === */
            --back-button-top: 60px;             /* 返回按钮距离顶部的距离 */
            --back-button-left: 20px;            /* 返回按钮距离左侧的距离 */
            --back-button-size: 40px;            /* 返回按钮大小 */

            /* === 第三步元素位置配置 === */
            --step3-container-top: 68%;          /* 问题容器垂直位置（越大越靠下）*/
            --step3-question-size: 20px;         /* 问题文字大小 */
            --step3-option-height: 56px;         /* 选项按钮高度 */
            --step3-option-gap: 15px;            /* 选项之间间距 */
            --step3-progress-bottom: 120px;      /* 进度点距离底部距离 */
            --video-overlay-opacity: 0.6;        /* 视频遮罩透明度（越大越暗）*/
            --step3-transition-duration: 0.4s;   /* 过场动画速度 */

            /* === 第四步元素位置配置 === */
            --step4-bubble-top: 75%;             /* 气泡图片距离顶部位置（越大越靠下）*/
            --step4-bubble-left: 50%;            /* 气泡图片水平位置（50%为居中）*/
            --step4-bubble-width: 280px;         /* 气泡图片宽度 */
            --step4-input-bottom: 80px;          /* 输入窗图片距离底部位置（越大越靠上）*/
            --step4-input-left: 50%;             /* 输入窗图片水平位置（50%为居中）*/
            --step4-input-width: 340px;          /* 输入窗图片宽度 */
        }

        /* ==================== 全局样式重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }

        /* 页面主体 - 黑色背景，垂直水平居中 */
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 手机容器 - 固定尺寸375x812（iPhone X尺寸） */
        .phone-container {
            width: 375px;
            height: 812px;
            position: relative;
            overflow: hidden; /* 隐藏超出容器的轮盘元素 */
            background: #000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* 固定背景 - 根据选择的角色动态切换背景图片 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./创建素材/背景.png') center/cover no-repeat;
            transition: background-image 0.5s ease; /* 背景切换时的过渡动画 */
        }

        /* 背景遮罩层 - 降低透明度以便顶部PNG图片可以透过显示 */
        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                rgba(0, 0, 0, 0.2) 0%,      /* 顶部遮罩降低到0.2，让PNG透明区域显示 */
                rgba(0, 0, 0, 0.3) 80%,
                rgba(0, 0, 0, 0.7) 100%
            );
        }

        /* 顶端虚化装饰图片 - PNG透明图层 */
        .top-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 5;
            pointer-events: none; /* 不阻止下层元素的交互 */
        }

        /* 顶端信息栏（时间、电量等）- PNG透明图层 */
        .top-info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 6;
            pointer-events: none; /* 不阻止下层元素的交互 */
        }

        /* 角色展示区域 - 预留位置，当前为空 */
        .character-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        /* 角色信息展示区 - 显示角色名字和性格描述 */
        .character-info {
            position: absolute;
            top: var(--character-info-top); /* 角色信息垂直位置，可在配置区域调整 */
            left: 0;
            width: 100%;
            padding: 20px;
            z-index: 3;
            text-align: center;
        }

        /* 角色名字样式 - 使用书法字体，带发光效果 */
        .character-name {
            font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive;
            font-size: var(--character-name-size); /* 角色名字字体大小，可在配置区域调整 */
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8),
                         0 0 40px currentColor; /* 发光效果，使用当前文字颜色 */
            margin-bottom: 12px;
            opacity: 0; /* 初始隐藏，配合动画出现 */
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        /* 角色名字激活状态 - 淡入并上移动画 */
        .character-name.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 角色性格描述样式 */
        .character-personality {
            font-size: var(--character-personality-size); /* 性格描述字体大小，可在配置区域调整 */
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            opacity: 0; /* 初始隐藏 */
            transform: translateY(20px);
            transition: all 0.5s ease 0.1s; /* 延迟0.1s，在名字之后出现 */
        }

        /* 角色性格描述激活状态 */
        .character-personality.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 底部选择器容器 - 包含轮盘和确认按钮 */
        .selector-container {
            position: absolute;
            bottom: var(--wheel-bottom); /* 轮盘距离底部距离，可在配置区域调整 */
            left: 0;
            width: 100%;
            height: auto;
            z-index: 4;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: var(--wheel-gap); /* 轮盘和按钮之间的间距，可在配置区域调整 */
            align-items: center;
            overflow: hidden;
        }

        /* 轮盘容器 - 3D透视效果的容器 */
        .wheel-container {
            width: 100%;
            height: var(--wheel-height); /* 轮盘容器高度，可在配置区域调整 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 3D透视深度 */
            overflow: visible; /* 允许轮盘元素超出屏幕边缘 */
        }

        /* 角色轮盘主体 - 宽度800px让选项可以延伸到屏幕外 */
        .character-wheel {
            position: relative;
            width: 800px;
            height: var(--wheel-height); /* 轮盘高度，与容器一致 */
            transform-style: preserve-3d; /* 保持3D变换效果 */
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* 弹性缓动效果 */
        }

        /* 轮盘单个选项 - 圆形头像 */
        .wheel-item {
            position: absolute;
            left: 50%; /* 水平居中基准点 */
            top: 62%; /* 用户调整后的垂直位置 */
            width: var(--wheel-item-size); /* 非选中头像大小，可在配置区域调整 */
            height: var(--wheel-item-size); /* 非选中头像大小，可在配置区域调整 */
            margin-left: calc(var(--wheel-item-size) / -2); /* 向左偏移自身宽度的一半，实现居中 */
            margin-top: calc(var(--wheel-item-size) / -2); /* 向上偏移自身高度的一半，实现居中 */
            border-radius: 50%; /* 圆形 */
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* 弹性缓动 */
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0.6; /* 非选中状态透明度 */
            transform-origin: center;
        }

        /* 轮盘激活选项 - 放大并高亮显示 */
        .wheel-item.active {
            width: var(--wheel-item-active-size); /* 选中头像放大尺寸，可在配置区域调整 */
            height: var(--wheel-item-active-size); /* 选中头像放大尺寸，可在配置区域调整 */
            margin-left: calc(var(--wheel-item-active-size) / -2); /* 放大后重新居中 */
            margin-top: calc(var(--wheel-item-active-size) / -2); /* 放大后重新居中 */
            border-color: #fff;
            opacity: 1;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8); /* 发光效果 */
            z-index: 10;
        }

        /* 轮盘选项内的头像图片 */
        .wheel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 图片铺满容器 */
            pointer-events: none; /* 图片不响应点击，由父元素处理 */
        }

        /* 中心指示器 - 标识当前选中位置 */
        .center-indicator {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            z-index: 5;
        }

        /* 确认按钮 - 使用图片按钮 */
        .confirm-button {
            position: relative; /* 确保按钮可以被点击 */
            width: 100%;
            height: auto;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 20; /* 确保按钮在第二步元素上方，可以被点击 */
            pointer-events: auto; /* 确保按钮可以接收点击事件 */
        }

        /* 确认按钮内的图片 */
        .confirm-button img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none; /* 图片不拦截点击，让点击事件传递给按钮 */
        }

        /* 确认按钮按下效果 */
        .confirm-button:active {
            transform: scale(0.95); /* 缩小到95% */
            opacity: 0.8;
        }

        /* ========== 第二步相关样式 ========== */
        /* 返回按钮 - 位于左上角，用于从第二步返回第一步 */
        .back-button {
            position: absolute;
            top: var(--back-button-top); /* 返回按钮距离顶部距离，可在配置区域调整 */
            left: var(--back-button-left); /* 返回按钮距离左侧距离，可在配置区域调整 */
            width: var(--back-button-size); /* 返回按钮大小，可在配置区域调整 */
            height: var(--back-button-size); /* 返回按钮大小，可在配置区域调整 */
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 11;
            opacity: 0; /* 初始隐藏 */
            pointer-events: none;
            transition: all 0.3s ease;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        /* 返回按钮激活状态 */
        .back-button.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 返回按钮悬停效果 */
        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* 返回按钮按下效果 */
        .back-button:active {
            transform: scale(0.95);
        }

        /* 第二步容器 - 昵称输入和音色选择 */
        /* 定位在角色信息下方，不覆盖角色信息 */
        .step2-container {
            position: absolute;
            top: var(--step2-top); /* 第二步容器垂直位置，确保在角色信息下方，可在配置区域调整 */
            left: 50%;
            transform: translateX(-50%); /* 只水平居中，不垂直居中 */
            width: 85%;
            z-index: 10;
            opacity: 0;
            pointer-events: none; /* 初始状态不可交互 */
            transition: opacity 0.5s ease;
        }

        /* 第二步容器激活状态 */
        .step2-container.active {
            opacity: 1;
            pointer-events: auto; /* 激活后可以交互 */
        }

        /* 虚化效果 - 应用到轮盘容器 */
        .wheel-container.blurred {
            filter: blur(10px);
            opacity: 0.3;
            pointer-events: none; /* 虚化后不可点击 */
            transition: all 0.5s ease;
        }

        /* 问题文本样式 */
        .question-text {
            font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive;
            font-size: var(--step2-question-size); /* 问题文字大小，可在配置区域调整 */
            color: #fff;
            text-align: center;
            margin-top: var(--step2-question-top-margin); /* 问题上方间距，可在配置区域调整 */
            margin-bottom: var(--step2-question-bottom-margin); /* 问题下方间距，可在配置区域调整 */
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8),
                         0 0 30px rgba(255, 255, 255, 0.6);
        }

        /* 输入框容器 - 毛玻璃效果 */
        .input-wrapper {
            position: relative;
            margin-bottom: var(--step2-input-bottom-margin); /* 输入框下方间距，可在配置区域调整 */
        }

        /* 输入框样式 - 毛玻璃背景 */
        .nickname-input {
            width: 100%;
            height: var(--step2-input-height); /* 输入框高度，可在配置区域调整 */
            background: rgba(255, 255, 255, 0.15); /* 半透明白色背景 */
            backdrop-filter: blur(20px); /* 背景虚化效果 */
            -webkit-backdrop-filter: blur(20px); /* Safari兼容 */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 0 20px;
            font-size: 16px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 输入框占位符样式 */
        .nickname-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* 输入框聚焦状态 */
        .nickname-input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.2);
        }

        /* 音色选择标题 */
        .voice-title {
            font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive; /* 使用与其他问题相同的书法字体 */
            font-size: var(--step2-voice-title-size); /* 音色标题文字大小，可在配置区域调整 */
            color: #fff;
            text-align: center;
            margin-bottom: var(--step2-voice-title-bottom-margin); /* 音色标题下方间距，可在配置区域调整 */
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* 音色选项容器 */
        .voice-options {
            display: flex;
            justify-content: space-between;
            gap: var(--step2-voice-button-gap); /* 音色按钮之间间距，可在配置区域调整 */
            margin-bottom: var(--step2-voice-options-bottom-margin); /* 音色选项区域下方间距，可在配置区域调整 */
        }

        /* 单个音色选项按钮 */
        .voice-option {
            flex: 1;
            height: var(--step2-voice-button-height); /* 音色按钮高度，可在配置区域调整 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* 音色选项按钮悬停效果 */
        .voice-option:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        /* 音色选项按钮按下效果 */
        .voice-option:active {
            transform: translateY(0) scale(0.98);
        }

        /* 音色选项播放中状态 - 增强选中效果，更清晰醒目 */
        .voice-option.playing {
            background: rgba(139, 233, 253, 0.45); /* 青色半透明背景 */
            border: 2px solid rgba(139, 233, 253, 1); /* 亮青色边框 */
            color: #fff;
            transform: scale(1.08); /* 放大突出 */
            box-shadow: 0 0 40px rgba(139, 233, 253, 0.8),
                        0 0 20px rgba(139, 233, 253, 0.6),
                        inset 0 0 20px rgba(139, 233, 253, 0.3); /* 多层光晕效果 */
            position: relative;
        }

        /* 选中后悬停也保持选中效果 */
        .voice-option.playing:hover {
            background: rgba(139, 233, 253, 0.5);
            border-color: rgba(139, 233, 253, 1);
            transform: scale(1.08) translateY(0); /* 保持放大，不移动 */
        }

        /* 播放中状态的脉冲动画 */
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 40px rgba(139, 233, 253, 0.8),
                            0 0 20px rgba(139, 233, 253, 0.6),
                            inset 0 0 20px rgba(139, 233, 253, 0.3);
            }
            50% {
                box-shadow: 0 0 50px rgba(139, 233, 253, 1),
                            0 0 30px rgba(139, 233, 253, 0.8),
                            inset 0 0 25px rgba(139, 233, 253, 0.4);
            }
        }

        .voice-option.playing {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* ========== Step 3: 视频背景样式 ========== */
        /* 视频背景元素 - 显示在背景图片上方，内容下方 */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 填充容器，保持比例裁剪 */
            z-index: 2; /* 在.background(z-index:1)之上，内容(z-index:10+)之下 */
            opacity: 0; /* 初始隐藏 */
            pointer-events: none; /* 不阻止下层点击 */
            transition: opacity 0.5s ease;
        }

        /* 视频背景激活状态 */
        .video-background.active {
            opacity: 1;
        }

        /* 视频遮罩层 - 确保文字可读性 */
        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(0, 0, 0, var(--video-overlay-opacity)) 0%,
                rgba(0, 0, 0, 0.4) 50%,
                rgba(0, 0, 0, 0.8) 100%
            );
            z-index: 1;
        }

        /* ========== Step 3: 问题系统样式 ========== */
        /* Step 3 主容器 */
        .step3-container {
            position: absolute;
            top: var(--step3-container-top); /* 可在配置区域调整垂直位置 */
            left: 50%;
            transform: translateX(-50%) scale(0.95); /* 初始缩小，准备动画 */
            width: 85%;
            max-width: 320px;
            z-index: 10;
            opacity: 0; /* 初始隐藏 */
            pointer-events: none; /* 不可交互 */
            transition: all var(--step3-transition-duration) ease;
        }

        /* Step 3 激活状态 - 淡入并放大 */
        .step3-container.active {
            opacity: 1;
            pointer-events: auto; /* 可交互 */
            transform: translateX(-50%) scale(1); /* 放大到正常大小 */
        }

        /* 进度点容器 */
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        /* 单个进度点 */
        .progress-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        /* 当前激活的进度点 - 拉长并发光 */
        .progress-dots .dot.active {
            width: 24px; /* 拉长为椭圆形 */
            border-radius: 4px;
            background: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        /* 问题显示容器 */
        .question-display {
            width: 100%;
            transition: all 0.3s ease;
        }

        /* 问题滑出动画 - 向上淡出 */
        .question-display.slide-out {
            opacity: 0;
            transform: translateY(-20px);
        }

        /* 问题滑入动画 - 从下方进入 */
        .question-display.slide-in {
            opacity: 0;
            transform: translateY(20px);
        }

        /* 问题文本样式（Step 3专用，覆盖之前的.question-text） */
        .step3-container .question-text {
            font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive;
            font-size: var(--step3-question-size); /* 可在配置区域调整 */
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
            text-shadow:
                0 4px 20px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(255, 255, 255, 0.4);
        }

        /* 选项按钮容器 */
        .option-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--step3-option-gap); /* 可在配置区域调整 */
        }

        /* 单个选项按钮 */
        .option-button {
            width: 100%;
            min-height: var(--step3-option-height); /* 可在配置区域调整 */
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            font-size: 15px;
        }

        /* 选项按钮悬停效果 */
        .option-button:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
        }

        /* 选项按钮按下效果 */
        .option-button:active {
            transform: scale(0.95);
        }

        /* 选项按钮选中动画 */
        .option-button.selected {
            background: rgba(255, 255, 255, 0.4);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            transform: scale(0.95);
        }

        /* 选项标签（A/B圆形徽章） */
        .option-label {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 14px;

        }

        /* 选项文本 */
        .option-text {
            flex: 1;
            line-height: 1.4;
        }

        /* 当Step 3激活时，隐藏其他元素 */
        .phone-container.step3-active .character-info {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .phone-container.step3-active .selector-container {

            pointer-events: none;

        }

        .phone-container.step3-active .top-blur,
        .phone-container.step3-active .top-info {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* ========== 第四步样式 ========== */
        /* 第四步容器 */
        .step4-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;

        /* 气泡图片 */
        .bubble-image {

            .phone-container {

    <script>
        // ========== 角色数据配置 ==========

        const characters = [

            },
            {

                personality: '神秘莫测，魅力非凡，在魔法世界里自由翱翔',
                image: './创建素材/霸道总裁小头像.png',

            },
            {
                id: 7,
                name: '贵族王子',
                personality: '高贵优雅，风度翩翩，如童话般的完美存在',
                image: './创建素材/野性男大小头像.png',
                background: './创建素材/背景.png'
            },
            {
                id: 8,
                name: '摇滚歌手',
                personality: '狂放不羁，激情四射，用音乐点燃世界的热情',
                image: './创建素材/霸道总裁小头像.png',
                background: './创建素材/背景2.png'
            }
        ];

        // ========== 全局变量 ==========
        // 当前选中的角色ID（默认选中第一个角色）
        let selectedCharacterId = 1;
        // 当前播放的音频元素
        let currentAudio = null;
        // 当前所在的步骤：1表示角色选择步骤，2表示昵称和音色选择步骤，3表示问题系统步骤
        let currentStep = 1;
        // 用户选择的数据（保存用户在各个步骤中的选择）
        let userSelections = {
            character: null,    // 选择的角色对象
            nickname: '',       // 输入的昵称
            voice: null,        // 选择的音色编号（1、2或3）
            step3Answers: {}    // 第三步的问题答案（q1, q2, q3, q4）
        };

        // ========== Step 3: 问题系统变量 ==========
        // 当前问题编号（1-4）
        let currentQuestion = 1;
        // 总问题数
        const totalQuestions = 4;

        // 问题数据配置 - 4个问题，每个问题有2个选项
        const questions = [
            {
                id: 1,
                text: '更喜欢我怎样与你相处？',
                optionA: '热闹鲜活，时刻陪伴分享',

            },

                text: '我哪种性格特质更容易触动你？',
                optionA: '踏实靠谱、做事稳妥、有安全感',
                optionB: '浪漫独特、灵魂共鸣、氛围感'
            },
            {
                id: 3,
                text: '当你有情绪时，希望我可以？',
                optionA: '讲道理解决问题，冷静处理',
                optionB: '先哄情绪，温柔包容偏爱'
            },
            {
                id: 4,
                text: '你更偏好我拥有怎样的生活态度？',
                optionA: '稳定长久、有规划、成熟安稳',
                optionB: '自由松弛、随心浪漫、不被束缚'
            }
        ];

        // ========== 初始化函数 ==========
        // 页面加载完成后执行，创建轮盘选项并设置初始状态
        function init() {
            const wheelContainer = document.querySelector('.character-wheel');

            // 遍历所有角色，创建轮盘项目
            characters.forEach((char, index) => {
                // 创建轮盘项目的DOM元素
                const item = document.createElement('div');
                item.className = `wheel-item ${index === 0 ? 'active' : ''}`; // 第一个默认激活
                item.onclick = () => selectCharacter(char.id); // 绑定点击事件
                item.dataset.index = index; // 保存索引，方便后续操作

                // 创建头像图片元素
                const img = document.createElement('img');
                img.src = char.image;
                img.alt = char.name;

                // 将图片添加到轮盘项目中
                item.appendChild(img);
                wheelContainer.appendChild(item);
            });

            // 初始化轮盘位置（计算每个选项的3D位置）
            updateWheelPositions();

            // 显示初始角色信息（名字、性格描述、背景）
            updateCharacterInfo(selectedCharacterId);
        }

        // ========== 更新轮盘位置函数 ==========
        // 根据当前选中的角色，计算所有轮盘项目的3D位置
        // 使用三角函数创建U形圆弧效果（底部凸起）
        function updateWheelPositions() {
            const items = document.querySelectorAll('.wheel-item'); // 获取所有轮盘项目
            const total = items.length; // 总数量
            // 从CSS变量读取轮盘半径，实现统一配置管理
            const radius = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--wheel-radius'));
            const selectedIndex = characters.findIndex(c => c.id === selectedCharacterId); // 找到当前选中角色的索引

            items.forEach((item, index) => {
                // 计算当前项目相对于选中项的偏移量（正数表示在右侧，负数表示在左侧）
                let offset = index - selectedIndex;

                // 计算角度 (水平圆弧排列)
                // 使用Math.PI创建半圆弧效果，除以(total * 0.8)控制角度分布
                const angle = (offset / (total * 0.8)) * Math.PI;

                // 计算3D位置
                const x = Math.sin(angle) * radius; // 水平位置（左右）
                const y = (1 - Math.cos(angle)) * radius * 0.5; // 垂直位置（上下）- U形效果，越靠边越往下
                const z = Math.cos(angle) * 10; // 深度位置（前后）

                // 计算缩放和透明度（离中心越远越小越透明）
                const distance = Math.abs(offset); // 距离中心的绝对距离
                const scale = Math.max(0.5, 1 - distance * 0.15); // 缩放比例：最小0.5
                const opacity = Math.max(0.4, 1 - distance * 0.6); // 透明度：最小0.4

                // 应用3D变换
                item.style.transform = `translate3d(${x}px, ${y}px, ${z}px) scale(${scale})`;
                item.style.opacity = opacity;
                item.style.zIndex = Math.round(100 - distance * 10); // 越靠近中心z-index越高
            });
        }

        // ========== 选择角色函数 ==========
        // 当用户点击轮盘中的某个角色头像时调用
        function selectCharacter(id) {
            // 如果点击的是当前已选中的角色，不做任何操作
            if (selectedCharacterId === id) return;

            // 更新选中的角色ID
            selectedCharacterId = id;

            // 更新轮盘项目的激活状态（添加/移除active类）
            const selectedIndex = characters.findIndex(c => c.id === id);
            document.querySelectorAll('.wheel-item').forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('active'); // 选中的项目添加active类（放大、高亮）
                } else {
                    item.classList.remove('active'); // 其他项目移除active类
                }
            });

            // 重新计算轮盘位置（让新选中的角色移动到中心）
            updateWheelPositions();

            // 更新角色信息显示（名字、性格描述、背景图片）
            updateCharacterInfo(id);

            // 触发手机振动反馈（如果设备支持）
            if (navigator.vibrate) {
                navigator.vibrate(10); // 振动10毫秒
            }
        }

        // ========== 更新角色信息函数 ==========
        // 更新页面上显示的角色名字、性格描述和背景图片
        function updateCharacterInfo(id) {
            // 从角色数据中找到对应的角色对象
            const character = characters.find(c => c.id === id);
            const nameEl = document.getElementById('characterName');
            const personalityEl = document.getElementById('characterPersonality');
            const backgroundEl = document.querySelector('.background');

            // 先移除active类，触发淡出动画
            nameEl.classList.remove('active');
            personalityEl.classList.remove('active');

            // 延迟100ms后更新文字内容并添加active类，触发淡入动画
            setTimeout(() => {
                nameEl.textContent = character.name; // 更新角色名字
                personalityEl.textContent = character.personality; // 更新性格描述
                nameEl.classList.add('active'); // 添加active类，触发淡入
                personalityEl.classList.add('active');
            }, 100);

            // 切换背景图片（根据角色的background属性）
            backgroundEl.style.backgroundImage = `url('${character.background}')`;
        }

        // ========== 按钮点击处理函数 ==========
        // 统一处理确认按钮的点击事件，根据当前步骤执行不同的操作
        function handleConfirmClick() {
            if (currentStep === 1) {
                // 第一步：从角色选择进入昵称和音色选择
                goToStep2();
            } else if (currentStep === 2) {
                // 第二步：完成所有设置，提交数据
                completeSetup();
            }
        }

        // ========== 进入第二步函数 ==========
        // 从第一步（角色选择）过渡到第二步（昵称和音色选择）
        function goToStep2() {
            // 获取当前选中的角色对象
            const character = characters.find(c => c.id === selectedCharacterId);

            // 保存角色选择到全局数据对象
            userSelections.character = character;

            // 虚化轮盘容器，让用户聚焦于第二步的内容
            const wheelContainer = document.querySelector('.wheel-container');
            wheelContainer.classList.add('blurred');

            // 隐藏确认按钮（稍后会在第二步容器底部重新显示）
            const confirmButton = document.getElementById('confirmButton');
            confirmButton.style.opacity = '0';
            confirmButton.style.pointerEvents = 'none';

            // 注意：角色信息保持可见，不进行虚化处理
            // 这样用户可以继续看到自己选择的角色信息

            // 显示返回按钮
            const backButton = document.getElementById('backButton');
            backButton.classList.add('active');

            // 延迟300ms后显示第二步容器（等待虚化效果完成）
            setTimeout(() => {
                const step2Container = document.getElementById('step2Container');
                step2Container.classList.add('active');

                // 同时恢复确认按钮显示（在第二步中用作"完成创建"按钮）
                confirmButton.style.opacity = '1';
                confirmButton.style.pointerEvents = 'auto';

                // 更新当前步骤为第二步
                currentStep = 2;
            }, 300);

            // 触发手机振动反馈（如果设备支持）
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        // ========== 返回按钮函数 ==========
        // 返回按钮点击处理 - 根据当前步骤返回到对应的上一步
        function goBackToStep1() {
            // 如果当前在第三步，返回到第二步
            if (currentStep === 3) {
                goBackToStep2FromStep3();
                return;
            }

            // 如果当前在第二步，返回到第一步（角色选择）
            // 隐藏第二步容器
            const step2Container = document.getElementById('step2Container');
            step2Container.classList.remove('active');

            // 清除从Step 3返回时设置的内联样式
            step2Container.style.transform = '';
            step2Container.style.opacity = '';
            step2Container.style.filter = '';
            step2Container.style.transition = '';

            // 隐藏返回按钮
            const backButton = document.getElementById('backButton');
            backButton.classList.remove('active');

            // 移除轮盘容器的虚化效果
            const wheelContainer = document.querySelector('.wheel-container');
            wheelContainer.classList.remove('blurred');

            // 停止当前播放的音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                document.querySelectorAll('.voice-option').forEach(btn => {
                    btn.classList.remove('playing');
                });
                currentAudio = null;
            }

            // 清空第二步的输入数据
            document.getElementById('nicknameInput').value = '';
            userSelections.nickname = '';
            userSelections.voice = null;

            // 确认按钮保持显示（用于重新进入第二步）
            const confirmButton = document.getElementById('confirmButton');
            confirmButton.style.opacity = '1';
            confirmButton.style.pointerEvents = 'auto';

            // 更新当前步骤为第一步
            currentStep = 1;

            // 触发手机振动反馈
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        // ========== 从第三步返回第二步函数 ==========
        // 从Step 3返回到Step 2 - 恢复背景并重置过渡效果
        function goBackToStep2FromStep3() {
            // 隐藏Step 3容器
            const step3Container = document.getElementById('step3Container');
            step3Container.classList.remove('active');

            // 隐藏并停止视频
            const videoBackground = document.getElementById('videoBackground');
            videoBackground.classList.remove('active');
            videoBackground.pause();
            videoBackground.style.transform = 'scale(1)'; // 重置视频缩放

            // 移除phone-container的step3-active类，恢复其他元素显示
            const phoneContainer = document.querySelector('.phone-container');
            phoneContainer.classList.remove('step3-active');

            // 恢复背景图片透明度
            const background = document.querySelector('.background');
            background.style.opacity = '1';

            // 显示Step 2容器并重置其样式
            const step2Container = document.getElementById('step2Container');
            step2Container.style.transform = 'translateX(-50%) scale(1)';
            step2Container.style.opacity = '1';
            step2Container.style.filter = 'blur(0)';
            step2Container.style.transition = 'all 0.3s ease';
            step2Container.classList.add('active');

            // 显示确认按钮并重置其样式
            const confirmButton = document.getElementById('confirmButton');
            confirmButton.style.opacity = '1';
            confirmButton.style.transform = 'scale(1)';
            confirmButton.style.pointerEvents = 'auto';

            // 重置第三步的数据
            currentQuestion = 1;
            userSelections.step3Answers = {};

            // 更新当前步骤为第二步
            currentStep = 2;

            // 触发振动反馈
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        // ========== 播放音色函数 ==========
        // 点击音色选项时播放对应的音频文件
        // @param voiceNumber - 音色编号（1、2或3）
        function playVoice(voiceNumber) {
            // 停止当前正在播放的音频
            if (currentAudio) {
                currentAudio.pause(); // 暂停播放
                currentAudio.currentTime = 0; // 重置播放进度
                // 移除所有音色按钮的播放状态样式
                document.querySelectorAll('.voice-option').forEach(btn => {
                    btn.classList.remove('playing');
                });
            }

            // 获取对应的音频元素
            const audioElement = document.getElementById(`voice${voiceNumber}`);
            currentAudio = audioElement;

            // 给当前点击的音色按钮添加播放状态样式（高亮显示）
            const buttons = document.querySelectorAll('.voice-option');
            buttons[voiceNumber - 1].classList.add('playing');

            // 播放音频
            audioElement.play();

            // 保存音色选择到全局数据对象
            userSelections.voice = voiceNumber;

            // 音频播放结束时自动移除播放状态样式
            audioElement.onended = () => {
                buttons[voiceNumber - 1].classList.remove('playing');
            };

            // 触发振动反馈（轻微振动，表示点击成功）
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }

        // ========== 完成设置函数 ==========
        // 用户完成所有选择后点击"完成创建"按钮（即第二步的确认按钮）
        function completeSetup() {
            // 获取用户输入的昵称并去除首尾空格
            const nickname = document.getElementById('nicknameInput').value.trim();

            // 验证是否输入了昵称
            if (!nickname) {
                alert('请输入你的昵称！');
                return; // 中断函数执行
            }

            // 保存昵称到全局数据对象
            userSelections.nickname = nickname;

            // 验证是否选择了音色
            if (!userSelections.voice) {
                alert('请选择一个音色！');
                return; // 中断函数执行
            }

            // 所有数据验证通过，进入第三步（问题系统）
            goToStep3();
        }

        // ========== Step 3: 进入第三步函数 ==========
        // 从Step 2过渡到Step 3，显示视频背景和问题系统 - 增强过渡效果
        function goToStep3() {
            // 更新当前步骤
            currentStep = 3;
            currentQuestion = 1;

            // 获取所有需要操作的元素
            const phoneContainer = document.querySelector('.phone-container');
            const step2Container = document.getElementById('step2Container');
            const confirmButton = document.getElementById('confirmButton');
            const videoBackground = document.getElementById('videoBackground');
            const step3Container = document.getElementById('step3Container');
            const background = document.querySelector('.background');

            // === 第1阶段: Step 2淡出并放大 (0ms - 500ms) ===
            step2Container.style.transition = 'all 0.5s ease';
            step2Container.style.transform = 'translateX(-50%) scale(1.1)';
            step2Container.style.opacity = '0';
            step2Container.style.filter = 'blur(10px)';

            confirmButton.style.transition = 'all 0.3s ease';
            confirmButton.style.opacity = '0';
            confirmButton.style.transform = 'scale(0.8)';
            confirmButton.style.pointerEvents = 'none';

            // === 第2阶段: 背景图淡出 (200ms - 800ms) ===
            setTimeout(() => {
                background.style.transition = 'opacity 0.6s ease';
                background.style.opacity = '0.3'; // 淡化背景图
            }, 200);

            // === 第3阶段: 视频淡入并放大 (400ms - 1100ms) ===
            setTimeout(() => {
                videoBackground.style.transition = 'all 0.7s cubic-bezier(0.22, 1, 0.36, 1)';
                videoBackground.style.transform = 'scale(1.05)'; // 轻微放大视频
                videoBackground.classList.add('active');
                videoBackground.play().catch(err => {
                    console.log('视频自动播放失败（可能需要用户交互）:', err);
                });

                // 视频放大后恢复正常大小
                setTimeout(() => {
                    videoBackground.style.transition = 'transform 1.5s cubic-bezier(0.22, 1, 0.36, 1)';
                    videoBackground.style.transform = 'scale(1)';
                }, 100);
            }, 400);

            // === 第4阶段: 隐藏其他UI元素 (500ms) ===
            setTimeout(() => {
                phoneContainer.classList.add('step3-active');
                step2Container.classList.remove('active');
            }, 500);

            // === 第5阶段: Step 3容器缩放淡入 (900ms - 1300ms) ===
            setTimeout(() => {
                step3Container.classList.add('active');
                loadQuestion(1);
            }, 900);

            // 触发振动反馈 - 双脉冲模式
            if (navigator.vibrate) {
                navigator.vibrate([50, 100, 50]);
            }
        }

        // ========== Step 3: 加载问题函数 ==========
        // 显示指定编号的问题及其选项
        function loadQuestion(questionNumber) {
            const question = questions[questionNumber - 1];

            // 更新问题文本和选项文本
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('optionAText').textContent = question.optionA;
            document.getElementById('optionBText').textContent = question.optionB;

            // 更新进度点
            updateProgressDots(questionNumber);

            // 移除按钮的选中状态
            document.getElementById('optionA').classList.remove('selected');
            document.getElementById('optionB').classList.remove('selected');
        }

        // ========== Step 3: 更新进度点函数 ==========
        // 更新进度指示器，显示当前是第几个问题
        function updateProgressDots(currentQuestionNumber) {
            const dots = document.querySelectorAll('.progress-dots .dot');
            dots.forEach((dot, index) => {
                if (index === currentQuestionNumber - 1) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // ========== Step 3: 选择答案函数 ==========
        // 用户点击选项A或B后触发
        function selectAnswer(choice) {
            // 保存答案到全局数据对象
            userSelections.step3Answers[`q${currentQuestion}`] = choice;

            // 在选中的按钮上添加.selected类（视觉反馈）
            const selectedButton = document.getElementById(`option${choice}`);
            selectedButton.classList.add('selected');

            // 触发振动反馈
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }

            // 延迟150ms后执行下一步（给用户视觉反馈时间）
            setTimeout(() => {
                if (currentQuestion < totalQuestions) {
                    // 还有下一个问题，进行过渡
                    transitionToNextQuestion();
                } else {
                    // 所有问题已回答完，完成Step 3
                    completeStep3();
                }
            }, 150);
        }

        // ========== Step 3: 过渡到下一个问题函数 ==========
        // 当前问题滑出，下一个问题滑入
        function transitionToNextQuestion() {
            const questionDisplay = document.getElementById('questionDisplay');

            // 添加slide-out类，问题向上淡出
            questionDisplay.classList.add('slide-out');

            // 延迟300ms后加载新问题
            setTimeout(() => {
                // 移动到下一个问题
                currentQuestion++;

                // 加载新问题的内容
                loadQuestion(currentQuestion);

                // 移除slide-out，添加slide-in（从下方位置准备进入）
                questionDisplay.classList.remove('slide-out');
                questionDisplay.classList.add('slide-in');

                // 短暂延迟后触发slide-in动画
                setTimeout(() => {
                    questionDisplay.classList.remove('slide-in');
                }, 50);
            }, 300);
        }

        // ========== Step 3: 完成第三步函数 ==========
        // 所有4个问题都回答完后执行，跳转到第四步
        function completeStep3() {
            // 打印所有用户选择到控制台（调试用）
            console.log('所有问题回答完成！', userSelections);

            // 触发振动反馈（完成的振动模式）
            if (navigator.vibrate) {
                navigator.vibrate([50, 100, 50]);
            }

            // 跳转到第四步
            goToStep4();
        }

        // ========== Step 4: 进入第四步函数 ==========
        // 从Step 3过渡到Step 4，显示气泡和输入窗
        function goToStep4() {
            // 更新当前步骤
            currentStep = 4;

            // 获取所有需要操作的元素
            const phoneContainer = document.querySelector('.phone-container');
            const step3Container = document.getElementById('step3Container');
            const step4Container = document.getElementById('step4Container');

            // Step 3淡出
            step3Container.style.transition = 'opacity 0.5s ease';
            step3Container.style.opacity = '0';
            step3Container.style.pointerEvents = 'none';

            // 添加Step 4激活class到容器
            phoneContainer.classList.add('step4-active');

            // 延迟300ms后显示Step 4
            setTimeout(() => {
                step4Container.classList.add('active');
            }, 300);

            // 触发振动反馈
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        // ========== 页面加载完成后执行初始化 ==========
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
